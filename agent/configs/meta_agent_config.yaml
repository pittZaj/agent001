# 元智能体配置

# 执行配置
execution:
  timeout: 60  # 单次执行超时（秒）
  max_iterations: 5  # 最大迭代次数
  target_score: 0.8  # 目标综合得分

# 评估权重
evaluation:
  weights:
    tool_accuracy: 0.6  # 工具调用准确率
    execution_success: 0.4  # 执行成功率

# LLM 配置（用于生成的 Agent）
llm:
  base_url: "http://127.0.0.1:8004/v1"
  model: "Qwen3-VL-4B-Instruct-FP8"
  api_key: "EMPTY"
  temperature: 0.2
  max_tokens: 2048

# 输出配置
output:
  save_artifacts: true
  artifacts_dir: "./artifacts"
  verbose: true
