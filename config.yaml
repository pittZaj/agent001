# KSAgent 配置文件

# LLM 配置（Qwen3-VL-4B vLLM 服务）
llm:
  base_url: "http://127.0.0.1:8004/v1"
  model: "Qwen3-VL-4B-Instruct-FP8"
  api_key: "EMPTY"
  temperature: 0.2
  max_tokens: 2048
  timeout: 60

# MCP 配置（ksipms 综合管理平台 - 真实 MCP Server）
# 阶段 2.5.1：HTTP 直连同事部署的 ksipms-mcp（19 个工具：ai_* / video_* / system_*）
# 鉴权：MCP Server 内部已处理后端鉴权，Python 侧无需传 AK/SK
mcp:
  enabled: true
  transport: http              # http | stdio（http 直连远程 MCP Server）
  endpoint: "http://192.168.1.199:6620/mcp"
  # OM 静态资源根（用于 ai_event_*.img_path 等相对路径转绝对 URL）
  om_base_url: "http://192.168.1.199:6611"
  timeout: 30

# RAG 知识库（可选，阶段 3 接入）
rag:
  enabled: false
  ragflow_url: "http://ragflow.internal:8080"
  dataset_id: "safety_regulations"
  top_k: 3

# 数据库（会话历史、任务日志）
database:
  enabled: false  # 阶段 1 不持久化，阶段 4 再开启
  url: "mysql+aiomysql://ksagent:password@localhost:3306/ksagent"
  pool_size: 10
  echo: false

# FastAPI 服务
server:
  host: "0.0.0.0"
  port: 8001
  reload: false
  log_level: "info"

# 日志
logging:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
